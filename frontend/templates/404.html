<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Team Thiran DR Detection</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1e3a5f 0%, #00a86b 100%);">
        <div style="text-align: center; color: white;">
            <h1 style="font-size: 6rem; font-weight: 700;">404</h1>
            <h2 style="font-size: 2rem; margin-bottom: 20px;">Page Not Found</h2>
            <p style="font-size: 1.1rem; margin-bottom: 30px;">Sorry, the page you are looking for doesn't exist.</p>
            <a href="{{ url_for('dashboard') if 'user_id' in session else url_for('login') }}" class="btn btn-light btn-lg">
                Go Back Home
            </a>
        </div>
    </div>
</body>
</html>
